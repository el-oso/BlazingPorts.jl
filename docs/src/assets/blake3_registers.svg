<svg xmlns="http://www.w3.org/2000/svg" width="900" height="510" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .ttl{font-size:18px;font-weight:700;fill:#222}
    .h{font-size:13px;font-weight:700;fill:#222}
    .lbl{font-size:12px;fill:#222}
    .sub{font-size:11px;fill:#555}
    .tag{font-size:11px;font-weight:700;fill:#fff}
  </style>
  <text x="20" y="30" class="ttl">Where BLAKE3's 13% actually lives — the chained-loop allocation</text>

  <!-- compute: beats asm -->
  <text x="20" y="62" class="h">1. The compute (compress G-mix), message in registers — both fit 32 zmm, zero spills:</text>
  <rect x="20" y="74" width="840" height="40" rx="6" fill="#2e8b57"/>
  <text x="40" y="99" class="tag">COMPRESS — Julia / flat-IR: 8.6–9.0 GB/s   ·   0 spills   ·   FASTER than the asm's 8.4</text>
  <text x="430" y="134" text-anchor="middle" class="sub" fill="#2e8b57" font-weight="700">Our compute already beats hand-written assembly. This is not the gap.</text>

  <!-- the chained leaf -->
  <text x="20" y="172" class="h">2. The chained leaf — the 16-block loop that also carries the 8-word chaining value across iterations:</text>
  <!-- loop sketch -->
  <g>
    <rect x="20" y="186" width="150" height="44" rx="6" fill="#eef2f7" stroke="#9aa7b5"/>
    <text x="95" y="205" text-anchor="middle" class="lbl">block b</text>
    <text x="95" y="221" text-anchor="middle" class="sub">transpose + compress</text>
    <path d="M170 208 h40" stroke="#888" stroke-width="2" marker-end="url(#a)"/>
    <rect x="210" y="186" width="150" height="44" rx="6" fill="#eef2f7" stroke="#9aa7b5"/>
    <text x="285" y="205" text-anchor="middle" class="lbl">block b+1</text>
    <text x="285" y="221" text-anchor="middle" class="sub">transpose + compress</text>
    <path d="M360 208 h40" stroke="#888" stroke-width="2" marker-end="url(#a)"/>
    <text x="410" y="212" class="sub">… ×16</text>
    <!-- CV carry -->
    <path d="M95 230 q95 40 190 0" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#r)"/>
    <text x="190" y="268" text-anchor="middle" class="sub" fill="#c0392b" font-weight="700">8 chaining-value registers held across every iteration</text>
  </g>
  <text x="470" y="205" class="lbl">A single block alone is 0 spills. But the loop</text>
  <text x="470" y="223" class="lbl">body needs all 32 zmm AND must hold 8 CV</text>
  <text x="470" y="241" class="lbl">across the back-edge → overflow → spills.</text>

  <!-- variants table -->
  <text x="20" y="300" class="h">We rebuilt the kernel in flat LLVM IR and measured six variants — the chained loop is a hard floor:</text>
  <g class="sub" fill="#222">
    <rect x="20" y="312" width="500" height="150" rx="8" fill="#fbfcfe" stroke="#d6dde6"/>
    <text x="34" y="333">single block, compute only</text>            <text x="430" y="333" font-weight="700" fill="#2e8b57">0 spills</text>
    <text x="34" y="356">16 blocks fully unrolled</text>               <text x="430" y="356">1612</text>
    <text x="34" y="379">block loop (chaining value in phi)</text>     <text x="430" y="379" font-weight="700">52</text>
    <text x="34" y="402">  + memory-clobber barrier</text>            <text x="430" y="402">56</text>
    <text x="34" y="425">  + llvm.loop unroll/interleave off</text>   <text x="430" y="425">52</text>
    <text x="34" y="448">  + constant rematerialization</text>        <text x="430" y="448">54</text>
  </g>

  <!-- takeaway -->
  <rect x="540" y="312" width="320" height="150" rx="8" fill="#708090"/>
  <text x="556" y="338" class="tag" font-size="12">The asm wins one thing only:</text>
  <text x="556" y="362" fill="#eef2f7" class="sub">it hand-allocates all 32 registers across the</text>
  <text x="556" y="380" fill="#eef2f7" class="sub">whole 16-block chained loop, zero spills.</text>
  <text x="556" y="406" fill="#fff" class="sub" font-weight="700">LLVM spills ~52 from any frontend —</text>
  <text x="556" y="424" fill="#fff" class="sub" font-weight="700">Julia or hand-written portable IR alike.</text>
  <text x="556" y="450" fill="#cdd6df" class="sub">Not the compute. Not the reduce. Not the language.</text>

  <text x="20" y="490" class="sub" fill="#555">Bottom line: our BLAKE3 computes faster than hand-tuned assembly; the asm's only edge is register-allocating the input plumbing — which no compiler reproduces.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#888"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#c0392b"/></marker>
  </defs>
</svg>
